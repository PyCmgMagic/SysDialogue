name: 磁盘空间分析
description: 扫描 /var 和 /home 下的大文件，不执行删除（v4.1）

parameters: []

steps:
  - id: s1
    type: tool_call
    tool: get_disk_usage
    args:
      path: /
      recursive: false
  - id: s2
    type: tool_call
    tool: find_files
    args:
      search_path: /var
      pattern: "*"
      min_size_mb: 100
      max_depth: 5
    depends_on: [s1]
  - id: s3
    type: tool_call
    tool: find_files
    args:
      search_path: /home
      pattern: "*"
      min_size_mb: 100
      max_depth: 4
    depends_on: [s1]
  - id: s4
    type: display
    depends_on: [s2, s3]
    template: |
      磁盘分析完成。
      /var 大文件：
      {{s2.result}}
      /home 大文件：
      {{s3.result}}
      如需释放空间，请确认后使用 delete_path 工具删除对应文件。

final:
  success_template: "磁盘空间分析完成，未执行任何删除。"
