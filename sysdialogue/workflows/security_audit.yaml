name: 安全巡查
description: 系统信息 + 进程 + 端口 + 网络四项只读巡查（v4.1）

parameters: []

steps:
  - id: s1
    type: tool_call
    tool: get_system_info
  - id: s2
    type: tool_call
    tool: list_processes
    args:
      top_n: 20
      sort_by: cpu
  - id: s3
    type: tool_call
    tool: get_port_status
    args:
      protocol: all
  - id: s4
    type: tool_call
    tool: get_network_info
  - id: s5
    type: display
    depends_on: [s1, s2, s3, s4]
    template: |
      安全巡查已完成：
      - 系统信息：已采集
      - Top 20 进程：已采集
      - 端口监听：已采集
      - 网络接口：已采集
      详细结果请在审计面板查看。

final:
  success_template: "安全巡查完成，共 4 项只读项全部采集成功。"
